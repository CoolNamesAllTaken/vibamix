description: Custom ePaper display controller

compatible: "pants-for-birds,epaper"

include: spi-device.yaml

properties:
  dc-gpios:
    type: phandle-array
    required: true
    description: Data/Command select (D/C#). Active low selects command mode.

  reset-gpios:
    type: phandle-array
    required: true
    description: Reset line. Active low resets the controller.

  busy-gpios:
    type: phandle-array
    required: true
    description: Busy indicator. Active high means the controller is busy.

  width:
    type: int
    required: true
    description: Display width in pixels.

  height:
    type: int
    required: true
    description: Display height in pixels.
