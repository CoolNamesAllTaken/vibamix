board:
  name: vibamix_xiao
  full_name: vibamix_xiao
  vendor: pants_for_birds
  socs:
  - name: nrf54l15
    variants:
    - name: xip
      cpucluster: cpuflpr

runners:
  run_once:
    '--recover':
      - runners:
          - nrfjprog
          - nrfutil
        run: first
        groups:
          - boards:
              - vibamix_xiao/nrf54l15/cpuapp
              - vibamix_xiao/nrf54l15/cpuflpr
              - vibamix_xiao/nrf54l15/cpuflpr/xip
    '--erase':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: first
        groups:
          - boards:
              - vibamix_xiao/nrf54l15/cpuapp
              - vibamix_xiao/nrf54l15/cpuflpr
              - vibamix_xiao/nrf54l15/cpuflpr/xip
    '--reset':
      - runners:
          - nrfjprog
          - jlink
          - nrfutil
        run: last
        groups:
          - boards:
              - vibamix_xiao/nrf54l15/cpuapp
              - vibamix_xiao/nrf54l15/cpuflpr
              - vibamix_xiao/nrf54l15/cpuflpr/xip